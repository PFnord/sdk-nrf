sample:
  description: Generate and write identity key.
  name: Identity key generation sample
common:
  tags:
    - keys
    - ci_samples_keys
  platform_allow:
    - nrf5340dk/nrf5340/cpuapp
    - nrf9160dk/nrf9160
    - nrf9161dk/nrf9161
    - nrf9151dk/nrf9151
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf54lm20dk/nrf54lm20b/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54lv10dk/nrf54lv10a/cpuapp
  integration_platforms:
    - nrf5340dk/nrf5340/cpuapp
    - nrf9160dk/nrf9160
    - nrf9161dk/nrf9161
    - nrf9151dk/nrf9151
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf54lm20dk/nrf54lm20b/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54lv10dk/nrf54lv10a/cpuapp
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Writing the identity key to KMU"
      - "Success!"
tests:
  sample.keys.identity_key_generate.random_key:
    sysbuild: true
    tags:
      - keys
      - ci_build
      - sysbuild
      - ci_samples_keys
  # The TFM regression tests rely on a specific key in order to pass.
  # This sample configuration is mainly useful for writing that expected key,
  # which is called a "dummy key".
  sample.keys.identity_key_generate.static_key:
    sysbuild: true
    extra_configs:
      - CONFIG_IDENTITY_KEY_DUMMY=y
    tags:
      - keys
      - ci_build
      - sysbuild
      - ci_samples_keys
